name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

    
jobs:
    test:
      strategy:
        fail-fast: false
        matrix:
          os: [ubuntu-latest, macos-latest, windows-latest]

      runs-on: ${{ matrix.os }}
      env:
        GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      steps:
        - name: checkout code
          uses: actions/checkout@v6

        - name: Install uv and Python
          uses: astral-sh/setup-uv@v8.0.0
          with:
            python-version: "3.11"
            enable-cache: true

        - name: Install R
          uses: r-lib/actions/setup-r@v2
          with:
            r-version: "release"

        - name: Install dependencies
          run: uv sync --group dev

        - name: Run tests
          run: uv run -m pytest
